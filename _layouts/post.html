---
layout: default
---
<article class="post">
  <h1 class="post-title">{{ page.title }}</h1>
  <div class="post-meta">
    <span class="post-date">{{ page.date | date: "%Y-%m-%d %H:%M" }}</span>
    {% if page.tags %}
    <span class="post-tags">
      {% for tag in page.tags %}
      <span class="tag">#{{ tag }}</span>
      {% endfor %}
    </span>
    {% endif %}
  </div>
  <div class="post-content">
    {{ content }}
  </div>
</article>
